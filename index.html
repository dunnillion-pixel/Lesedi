<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTodo - MVP 3</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .empty {
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>SmartTodo</h1>

  <div class="input-row">
    <input
      type="text"
      id="taskInput"
      placeholder="Enter a task..."
    >
    <button onclick="addTask()">Add</button>
  </div>

  <div id="taskContainer"></div>

  <script>
    let tasks = [];

    function renderTasks() {
      const container = document.getElementById("taskContainer");

      if (tasks.length === 0) {
        container.innerHTML =
          '<p class="empty">No tasks yet.</p>';
        return;
      }

      let html = "<ul>";

      tasks.forEach((task, index) => {
        html += `
          <li>
            <span>${task}</span>
            <button onclick="deleteTask(${index})">
              Delete
            </button>
          </li>
        `;
      });

      html += "</ul>";

      container.innerHTML = html;
    }

    function addTask() {
      const input =
        document.getElementById("taskInput");

      const task = input.value.trim();

      if (task === "") {
        return;
      }

      tasks.push(task);

      input.value = "";

      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);

      renderTasks();
    }

    renderTasks();
  </script>

</body>
</html>
