<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTodo - MVP 4</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .meta {
      font-size: 12px;
      color: #666;
      display: block;
    }

    .text {
      display: flex;
      flex-direction: column;
    }

    .empty {
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>

  <h1>SmartTodo</h1>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Enter a task..." />
    <button onclick="addTask()">Add</button>
  </div>

  <div id="taskContainer"></div>

  <script>
    let tasks = loadTasks();

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function loadTasks() {
      const stored = localStorage.getItem("tasks");
      return stored ? JSON.parse(stored) : [];
    }

    function renderTasks() {
      const container = document.getElementById("taskContainer");

      if (tasks.length === 0) {
        container.innerHTML = '<p class="empty">No tasks yet.</p>';
        return;
      }

      let html = "<ul>";

      tasks.forEach((task, index) => {
        const date = new Date(task.createdAt).toLocaleString();

        html += `
          <li>
            <div class="text">
              <span>${task.text}</span>
              <span class="meta">${date}</span>
            </div>
            <button onclick="deleteTask(${index})">Delete</button>
          </li>
        `;
      });

      html += "</ul>";

      container.innerHTML = html;
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      const text = input.value.trim();

      if (!text) return;

      tasks.push({
        text: text,
        createdAt: Date.now()
      });

      input.value = "";

      saveTasks();
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    renderTasks();
  </script>

</body>
</html>
