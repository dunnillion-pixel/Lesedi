<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTodo POC - MVP 2</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 60px;
      padding: 20px;
    }

    .card {
      max-width: 400px;
      margin: auto;
      padding: 24px;
      border: 1px solid #ddd;
      border-radius: 12px;
    }

    button {
      font-size: 18px;
      padding: 12px 24px;
      cursor: pointer;
      margin: 20px 0;
    }

    #count {
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>SmartTodo POC</h1>

    <button onclick="increment()">
      +1
    </button>

    <p>Current Count:</p>

    <div id="count">0</div>
  </div>

  <script>
    let count = 0;

    function increment() {
      count++;
      document.getElementById("count").textContent = count;
    }
  </script>

</body>
</html>
